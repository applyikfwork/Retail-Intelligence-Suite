openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: OmniStore AI API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: dashboard
  - name: customers
  - name: sales
  - name: campaigns
  - name: loyalty
  - name: posts
  - name: footfall
  - name: appointments
  - name: staff
  - name: expenses
  - name: inventory
  - name: reviews
  - name: referrals
  - name: invoices
  - name: forecast
  - name: openai
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/sales-by-hour:
    get:
      operationId: getSalesByHour
      tags: [dashboard]
      responses:
        "200":
          description: Hourly sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HourlySales"

  /dashboard/sales-by-day:
    get:
      operationId: getSalesByDay
      tags: [dashboard]
      responses:
        "200":
          description: Daily sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailySales"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: tier
          in: query
          schema:
            type: string
            enum: [all, vip, regular, new]
      responses:
        "200":
          description: Customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/top-loyal:
    get:
      operationId: getTopLoyalCustomers
      tags: [customers]
      responses:
        "200":
          description: Top loyal customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"

  /customers/win-back:
    get:
      operationId: getWinBackCustomers
      tags: [customers]
      summary: Customers at risk (no visit in 30+ days)
      responses:
        "200":
          description: At-risk customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WinBackCustomer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /sales:
    get:
      operationId: listSales
      tags: [sales]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sale"
    post:
      operationId: createSale
      tags: [sales]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSaleBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"

  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      responses:
        "200":
          description: Campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: createCampaign
      tags: [campaigns]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/dead-zones:
    get:
      operationId: getDeadZones
      tags: [campaigns]
      responses:
        "200":
          description: Dead zones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeadZone"

  /campaigns/suggestions:
    post:
      operationId: getCampaignSuggestions
      tags: [campaigns]
      summary: AI-generated Hinglish campaign message suggestions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignSuggestionsBody"
      responses:
        "200":
          description: Suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignSuggestionsResult"

  /loyalty/scan:
    post:
      operationId: recordLoyaltyScan
      tags: [loyalty]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoyaltyScanBody"
      responses:
        "200":
          description: Scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoyaltyScanResult"

  /loyalty/cards:
    get:
      operationId: listLoyaltyCards
      tags: [loyalty]
      responses:
        "200":
          description: Loyalty cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LoyaltyCard"

  /posts:
    get:
      operationId: listPosts
      tags: [posts]
      responses:
        "200":
          description: Posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SocialPost"
    post:
      operationId: createPost
      tags: [posts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialPost"

  /footfall/heatmap:
    get:
      operationId: getFootfallHeatmap
      tags: [footfall]
      responses:
        "200":
          description: Heatmap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FootfallHeatmap"

  /footfall/insights:
    get:
      operationId: getFootfallInsights
      tags: [footfall]
      responses:
        "200":
          description: Insights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FootfallInsight"

  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      parameters:
        - name: date
          in: query
          schema:
            type: string
            description: ISO date string for filtering
      responses:
        "200":
          description: Appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: createAppointment
      tags: [appointments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/{id}:
    patch:
      operationId: updateAppointment
      tags: [appointments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppointmentBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    delete:
      operationId: deleteAppointment
      tags: [appointments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      responses:
        "200":
          description: Staff
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffMember"
    post:
      operationId: createStaff
      tags: [staff]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /staff/{id}/performance:
    get:
      operationId: getStaffPerformance
      tags: [staff]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Performance data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffPerformance"

  /expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      responses:
        "200":
          description: Expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
    post:
      operationId: createExpense
      tags: [expenses]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpenseBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  /expenses/profit-summary:
    get:
      operationId: getProfitSummary
      tags: [expenses]
      responses:
        "200":
          description: Profit summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfitSummary"

  /inventory:
    get:
      operationId: listInventory
      tags: [inventory]
      responses:
        "200":
          description: Inventory
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"
    post:
      operationId: createInventoryItem
      tags: [inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInventoryBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /inventory/{id}:
    patch:
      operationId: updateInventoryItem
      tags: [inventory]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInventoryBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  /reviews/{id}/reply:
    post:
      operationId: replyToReview
      tags: [reviews]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewReplyBody"
      responses:
        "200":
          description: Reply posted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /referrals:
    get:
      operationId: listReferrals
      tags: [referrals]
      responses:
        "200":
          description: Referrals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Referral"
    post:
      operationId: createReferral
      tags: [referrals]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReferralBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Referral"

  /referrals/{code}/convert:
    post:
      operationId: convertReferral
      tags: [referrals]
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Converted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Referral"

  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      responses:
        "200":
          description: Invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /forecast/revenue:
    get:
      operationId: getRevenueForecast
      tags: [forecast]
      responses:
        "200":
          description: 7-day revenue forecast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueForecast"

  /openai/conversations:
    get:
      operationId: listConversations
      tags: [openai]
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [openai]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /openai/conversations/{id}/messages:
    get:
      operationId: listMessages
      tags: [openai]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [openai]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "200":
          description: Streaming SSE response
          content:
            text/event-stream:
              schema:
                type: string

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    DashboardSummary:
      type: object
      properties:
        todayRevenue:
          type: number
        todayCustomers:
          type: integer
        totalCustomers:
          type: integer
        activeCampaigns:
          type: integer
        loyaltyScansToday:
          type: integer
        revenueGrowthPercent:
          type: number
        topServiceToday:
          type: string
        deadZoneAlert:
          type: string
          nullable: true
        todayAppointments:
          type: integer
        lowStockAlerts:
          type: integer
        netProfitToday:
          type: number
      required:
        - todayRevenue
        - todayCustomers
        - totalCustomers
        - activeCampaigns
        - loyaltyScansToday
        - revenueGrowthPercent
        - topServiceToday
        - todayAppointments
        - lowStockAlerts
        - netProfitToday

    HourlySales:
      type: object
      properties:
        hour:
          type: integer
        label:
          type: string
        revenue:
          type: number
        customers:
          type: integer
        isDeadZone:
          type: boolean
      required: [hour, label, revenue, customers, isDeadZone]

    DailySales:
      type: object
      properties:
        day:
          type: string
        revenue:
          type: number
        customers:
          type: integer
      required: [day, revenue, customers]

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [sale, scan, campaign, post, call, appointment]
        description:
          type: string
        customerName:
          type: string
          nullable: true
        amount:
          type: number
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, type, description, createdAt]

    Customer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
          nullable: true
        tier:
          type: string
          enum: [vip, regular, new]
        totalSpend:
          type: number
        visitCount:
          type: integer
        lastVisit:
          type: string
          format: date-time
          nullable: true
        loyaltyScanCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - phone
        - tier
        - totalSpend
        - visitCount
        - loyaltyScanCount
        - createdAt

    WinBackCustomer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        tier:
          type: string
        totalSpend:
          type: number
        daysSinceVisit:
          type: integer
        suggestedOffer:
          type: string
        ltv:
          type: number
      required: [id, name, phone, tier, totalSpend, daysSinceVisit, suggestedOffer, ltv]

    CreateCustomerBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
          nullable: true
      required: [name, phone]

    Sale:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: integer
          nullable: true
        customerName:
          type: string
          nullable: true
        service:
          type: string
        amount:
          type: number
        paymentMethod:
          type: string
          enum: [cash, upi, card]
        staffId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, service, amount, paymentMethod, createdAt]

    CreateSaleBody:
      type: object
      properties:
        customerId:
          type: integer
          nullable: true
        service:
          type: string
        amount:
          type: number
        paymentMethod:
          type: string
          enum: [cash, upi, card]
        staffId:
          type: integer
          nullable: true
      required: [service, amount, paymentMethod]

    Campaign:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        message:
          type: string
        discountPercent:
          type: integer
          nullable: true
        targetTier:
          type: string
          enum: [all, vip, regular]
        sentCount:
          type: integer
        responseCount:
          type: integer
        status:
          type: string
          enum: [draft, sent, scheduled]
        scheduledFor:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - message
        - targetTier
        - sentCount
        - responseCount
        - status
        - createdAt

    CreateCampaignBody:
      type: object
      properties:
        title:
          type: string
        message:
          type: string
        discountPercent:
          type: integer
          nullable: true
        targetTier:
          type: string
          enum: [all, vip, regular]
        scheduledFor:
          type: string
          format: date-time
          nullable: true
      required: [title, message, targetTier]

    CampaignSuggestionsBody:
      type: object
      properties:
        deadZoneLabel:
          type: string
        discountPercent:
          type: integer
        targetTier:
          type: string
        service:
          type: string
      required: [deadZoneLabel, discountPercent, targetTier, service]

    CampaignSuggestionsResult:
      type: object
      properties:
        suggestions:
          type: array
          items:
            type: string
      required: [suggestions]

    DeadZone:
      type: object
      properties:
        dayOfWeek:
          type: string
        startHour:
          type: integer
        endHour:
          type: integer
        avgRevenue:
          type: number
        label:
          type: string
        suggestedDiscount:
          type: integer
      required: [dayOfWeek, startHour, endHour, avgRevenue, label, suggestedDiscount]

    LoyaltyCard:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: integer
        customerName:
          type: string
        phone:
          type: string
        scanCount:
          type: integer
        freeSessionEarned:
          type: boolean
        freeSessionRedeemed:
          type: boolean
        qrCode:
          type: string
        lastScan:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - customerId
        - customerName
        - phone
        - scanCount
        - freeSessionEarned
        - freeSessionRedeemed
        - qrCode

    LoyaltyScanBody:
      type: object
      properties:
        qrCode:
          type: string
        phone:
          type: string
      required: [qrCode, phone]

    LoyaltyScanResult:
      type: object
      properties:
        success:
          type: boolean
        scanCount:
          type: integer
        message:
          type: string
        freeSessionEarned:
          type: boolean
        nextFreeAt:
          type: integer
      required: [success, scanCount, message, freeSessionEarned, nextFreeAt]

    SocialPost:
      type: object
      properties:
        id:
          type: integer
        caption:
          type: string
        imageUrl:
          type: string
          nullable: true
        platforms:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [draft, published, scheduled]
        likes:
          type: integer
        reach:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, caption, platforms, status, likes, reach, createdAt]

    CreatePostBody:
      type: object
      properties:
        caption:
          type: string
        imageUrl:
          type: string
          nullable: true
        platforms:
          type: array
          items:
            type: string
        localKeywords:
          type: array
          items:
            type: string
      required: [caption, platforms]

    FootfallHeatmap:
      type: object
      properties:
        zones:
          type: array
          items:
            $ref: "#/components/schemas/HeatmapZone"
        lastUpdated:
          type: string
          format: date-time
